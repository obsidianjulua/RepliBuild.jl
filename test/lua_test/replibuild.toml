[project]
name = "LuaTest"
root = "."

[compile]
flags = ["-fPIC", "-O2", "-DLUA_USE_LINUX", "-x", "c"]
parallel = true
aot_thunks = false

[link]
enable_lto = false
optimization_level = "2"

[binary]
type = "shared"
strip_symbols = false

[wrap]
style = "clang"
use_clang_jl = true
enabled = true

[types]
strictness = "warn"
allow_unknown_structs = true
allow_function_pointers = true

[cache]
enabled = true
directory = ".replibuild_cache"

[dependencies.lua]
type = "git"
url = "https://github.com/lua/lua"
tag = "v5.4.7"
exclude = ["lua.c", "luac.c", "onelua.c"]
