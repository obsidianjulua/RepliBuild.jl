[project]
name = "stl_test"

[compile]
source_files = ["src/stl_api.cpp"]
include_dirs = ["include"]
flags = ["-std=c++17", "-fPIC", "-g"]
parallel = true

[types]
templates = ["std::vector<int>", "std::basic_string<char>"]
strictness = "warn"
allow_unknown_structs = true

[binary]
type = "shared"

[wrap]
enabled = true
style = "clang"
use_clang_jl = true

[paths]
build = "build"
source = "src"
output = "julia"
include = "include"
cache = ".replibuild_cache"
