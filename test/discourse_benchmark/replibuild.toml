[types]
allow_unknown_enums = false
strictness = "warn"
allow_unknown_structs = true
allow_function_pointers = true

[compile]
parallel = true
flags = ["-std=c++17", "-fPIC", "-O2", "-g0"]
source_files = ["src/bench.cpp"]
include_dirs = ["include", "src"]
aot_thunks = false

[link]
enable_lto = true
optimization_level = "2"

[binary]
strip_symbols = false
type = "shared"

[workflow]
stages = ["discover", "compile", "link", "binary", "wrap"]

[cache]
enabled = true
directory = ".replibuild_cache"

[wrap]
use_clang_jl = true
style = "clang"
enabled = true

[llvm]
toolchain = "auto"

[project]
name = "DiscBench"
root = "."
uuid = "b3a1c2d4-dead-beef-cafe-123456789abc"

[paths]
build = "build"
cache = ".replibuild_cache"
source = "src"
output = "julia"
include = "include"

[discovery]
max_depth = 10
walk_dependencies = true
enabled = true
ignore_patterns = ["build", ".git", ".cache", "results"]
parse_ast = true
