[project]
name = "pugixml_test"

[compile]
source_files = ["src/pugixml.cpp"]
include_dirs  = ["include"]
flags = ["-std=c++17", "-fPIC", "-g"]
parallel = true

[types]
strictness = "warn"
allow_unknown_structs = true
allow_function_pointers = true

[binary]
type = "shared"

[wrap]
enabled = true
style = "clang"
use_clang_jl = true

[paths]
build   = "build"
source  = "src"
output  = "julia"
include = "include"
cache   = ".replibuild_cache"
