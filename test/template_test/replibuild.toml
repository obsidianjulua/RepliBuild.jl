[project]
name = "template_test"

[compile]
source_files = ["src/lib.cpp"]
include_dirs = ["include"]
flags = ["-std=c++17", "-fPIC"]
parallel = true

[types]
templates = ["MyBox<int>", "MyBox<double>"]
template_headers = ["my_template.h"]

[binary]
type = "shared"

[wrap]
enabled = true
style = "clang"
use_clang_jl = true

[paths]
build = "build"
source = "src"
output = "julia"
include = "include"
cache = ".replibuild_cache"
