[project]
name = "cjson_test"

[dependencies.cjson]
type = "git"
url = "https://github.com/DaveGamble/cJSON.git"
tag = "v1.7.18"
exclude = ["cJSON_Utils.c", "test.c", "unity.c", "readme_examples.c"]

[compile]
flags = ["-xc", "-std=c99", "-fPIC", "-O2"]
parallel = true
aot_thunks = false

[link]
enable_lto = false
optimization_level = "2"

[binary]
type = "shared"
strip_symbols = false

[wrap]
enabled = true
style = "clang"
use_clang_jl = true

[workflow]
stages = ["discover", "compile", "link", "binary", "wrap"]

[paths]
build = "build"
source = "src"
output = "julia"
include = "include"
cache = ".replibuild_cache"

[cache]
enabled = true
directory = ".replibuild_cache"

[discovery]
enabled = true
max_depth = 10
parse_ast = true
ignore_patterns = ["build", ".git", ".cache"]

[types]
allow_unknown_structs = true
allow_unknown_enums = false
allow_function_pointers = true
strictness = "warn"

[llvm]
toolchain = "auto"
