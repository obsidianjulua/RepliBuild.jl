[project]
name = "sqlite_test"
root = "/home/john/Desktop/Projects/RepliBuild.jl/test/sqlite_test"

[compile]
source_files = ["/home/john/Desktop/Projects/RepliBuild.jl/test/sqlite_test/src/sqlite3.c"]
include_dirs = [
    "/home/john/Desktop/Projects/RepliBuild.jl/test/sqlite_test",
    "/home/john/Desktop/Projects/RepliBuild.jl/test/sqlite_test/include",
    "/home/john/Desktop/Projects/RepliBuild.jl/test/sqlite_test/src"
]
flags = ["-xc", "-std=c17", "-fPIC", "-DSQLITE_THREADSAFE=1", "-DSQLITE_ENABLE_FTS5", "-DSQLITE_ENABLE_JSON1"]
parallel = true

[link]
enable_lto = false
optimization_level = "2"

[binary]
type = "shared"
strip_symbols = false

[wrap]
enabled = true
style = "clang"
use_clang_jl = true

[wrap.varargs]
sqlite3_mprintf = [["Cstring"], ["Cstring", "Cint"], ["Cstring", "Cstring"]]
sqlite3_snprintf = [["Cint", "Cstring", "Cstring"], ["Cint", "Cstring", "Cstring", "Cint"]]

[workflow]
stages = ["discover", "compile", "link", "binary", "wrap"]

[paths]
build = "build"
source = "src"
output = "julia"
include = "include"
cache = ".replibuild_cache"

[cache]
enabled = true
directory = ".replibuild_cache"

[discovery]
enabled = true
max_depth = 10
parse_ast = true
ignore_patterns = ["build", ".git", ".cache"]

[types]
allow_unknown_structs = true
allow_unknown_enums = false
allow_function_pointers = true
strictness = "warn"

[llvm]
toolchain = "auto"
