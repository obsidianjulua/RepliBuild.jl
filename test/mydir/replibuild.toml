[types]
allow_unknown_enums = false
strictness = "warn"
allow_unknown_structs = true
allow_function_pointers = true

[compile]
parallel = true
flags = ["-fPIC", "-O3", "-march=native", "-ffast-math"]
source_files = ["/home/john/Desktop/Projects/RepliBuild.jl/test/mydir/src/main.c"]
include_dirs = ["/home/john/Desktop/Projects/RepliBuild.jl/test/mydir/", "/home/john/Desktop/Projects/RepliBuild.jl/test/mydir/src"]
aot_thunks = false

[link]
enable_lto = true
optimization_level = "3"

[binary]
strip_symbols = false
type = "shared"

[workflow]
stages = ["discover", "compile", "link", "binary", "wrap"]

[cache]
enabled = true
directory = ".replibuild_cache"

[wrap]
use_clang_jl = true
style = "clang"
language = "c"
enabled = true

[llvm]
toolchain = "auto"

[project]
name = "project"
root = "/home/john/Desktop/Projects/RepliBuild.jl/test/mydir/"
uuid = "96a78bc4-b45e-47b7-b51f-5605b095b297"

[paths]
build = "build"
cache = ".replibuild_cache"
source = "src"
output = "julia"
include = "include"

[discovery]
max_depth = 10
walk_dependencies = true
enabled = true
ignore_patterns = ["build", ".git", ".cache"]
parse_ast = true
