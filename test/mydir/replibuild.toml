[types]
allow_unknown_enums = false
strictness = "warn"
allow_unknown_structs = true
allow_function_pointers = true

[compile]
parallel = true
flags = ["-std=c++17", "-fPIC"]
source_files = ["/home/john/Desktop/Projects/RepliBuild.jl/test/mydir/src/main.cpp"]
include_dirs = ["/home/john/Desktop/Projects/RepliBuild.jl/test/mydir/", "/home/john/Desktop/Projects/RepliBuild.jl/test/mydir/src"]
aot_thunks = true

[link]
enable_lto = true
optimization_level = "0"

[binary]
strip_symbols = false
type = "shared"

[workflow]
stages = ["discover", "compile", "link", "binary", "wrap"]

[cache]
enabled = true
directory = ".replibuild_cache"

[wrap]
use_clang_jl = true
style = "clang"
enabled = true

[llvm]
toolchain = "auto"

[project]
name = "project"
root = "/home/john/Desktop/Projects/RepliBuild.jl/test/mydir/"
uuid = "f2e7e919-b0bb-4f50-a348-dcf7ac8aac97"

[paths]
build = "build"
cache = ".replibuild_cache"
source = "src"
output = "julia"
include = "include"

[discovery]
max_depth = 10
walk_dependencies = true
enabled = true
ignore_patterns = ["build", ".git", ".cache"]
parse_ast = true
