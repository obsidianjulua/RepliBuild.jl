[types]
allow_unknown_enums = false
strictness = "warn"
allow_unknown_structs = true
allow_function_pointers = true

[compile]
parallel = true
flags = ["-std=c++17", "-fPIC"]
source_files = ["/home/john/Desktop/Projects/RepliBuild.jl/test/custom_test/src/complex_ops.cpp"]
include_dirs = ["/home/john/Desktop/Projects/RepliBuild.jl/test/custom_test", "/home/john/Desktop/Projects/RepliBuild.jl/test/custom_test/include", "/home/john/Desktop/Projects/RepliBuild.jl/test/custom_test/src"]

[link]
enable_lto = false
optimization_level = "0"

[binary]
strip_symbols = false
type = "shared"

[workflow]
stages = ["discover", "compile", "link", "binary", "wrap"]

[cache]
enabled = true
directory = ".replibuild_cache"

[wrap]
use_clang_jl = true
style = "clang"
enabled = true

[llvm]
toolchain = "auto"

[project]
name = "custom_test"
root = "/home/john/Desktop/Projects/RepliBuild.jl/test/custom_test"
uuid = "43fbfb94-c885-44ee-aebd-f0f9a679454c"

[paths]
build = "build"
cache = ".replibuild_cache"
source = "src"
output = "julia"
include = "include"

[discovery]
max_depth = 10
walk_dependencies = true
enabled = true
ignore_patterns = ["build", ".git", ".cache"]
parse_ast = true
