[types]
allow_unknown_enums = false
strictness = "warn"
allow_unknown_structs = true
allow_function_pointers = true

[compile]
parallel = true
flags = ["-fPIC"]
source_files = ["/home/john/Desktop/Projects/RepliBuild.jl/test/duktape_test/src/duktape.c"]
include_dirs = ["/home/john/Desktop/Projects/RepliBuild.jl/test/duktape_test", "/home/john/Desktop/Projects/RepliBuild.jl/test/duktape_test/src"]
aot_thunks = false

[link]
enable_lto = false
optimization_level = "0"

[binary]
strip_symbols = false
type = "shared"

[workflow]
stages = ["discover", "compile", "link", "binary", "wrap"]

[cache]
enabled = true
directory = ".replibuild_cache"

[wrap]
use_clang_jl = true
style = "clang"
language = "c"
enabled = true
shim_headers = ["duktape.h"]

[wrap.macros.duk_peval_string]
ret = "int"
args = ["void*", "const char*"]

[llvm]
toolchain = "auto"

[project]
name = "duktape_test"
root = "/home/john/Desktop/Projects/RepliBuild.jl/test/duktape_test"
uuid = "141c002f-ec71-4e88-9ebf-0c6a520deebe"

[paths]
build = "build"
cache = ".replibuild_cache"
source = "src"
output = "julia"
include = "include"

[discovery]
max_depth = 10
walk_dependencies = true
enabled = true
ignore_patterns = ["build", ".git", ".cache"]
parse_ast = true
