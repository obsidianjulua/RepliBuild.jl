[types]
allow_unknown_enums = false
strictness = "warn"
allow_unknown_structs = true
allow_function_pointers = true

[compile]
parallel = true
flags = ["-std=c++17", "-fPIC"]
source_files = ["/home/john/Desktop/Projects/RepliBuild.jl/test/jit_edge_test/src/jit_edges.cpp"]
include_dirs = ["/home/john/Desktop/Projects/RepliBuild.jl/test/jit_edge_test", "/home/john/Desktop/Projects/RepliBuild.jl/test/jit_edge_test/include", "/home/john/Desktop/Projects/RepliBuild.jl/test/jit_edge_test/src"]
