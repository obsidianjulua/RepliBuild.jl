[project]
name = "ImGuiTest"
root = "."

[compile]
flags = ["-fPIC", "-O3", "-std=c++11"]
parallel = true

[link]
enable_lto = false

[binary]
type = "shared"

[wrap]
style = "clang"
use_clang_jl = true

[types]
strictness = "warn"
allow_unknown_structs = true
allow_function_pointers = true

[cache]
enabled = true
directory = ".replibuild_cache"

[dependencies.imgui]
type = "git"
url = "https://github.com/ocornut/imgui.git"
tag = "master"
exclude = [
    "backends/", "examples/", "misc/", "tools/", "docs/"
]
