name: Docs

on:
  push:
    branches:
      - main
    tags: '*'
    # Only rebuild + redeploy docs when something that can change the rendered
    # docs actually changes: the doc sources, or the docstrings they pull from.
    # Chore/test/UI/README commits no longer spawn a gh-pages "build based on X".
    paths:
      - 'docs/**'
      - 'src/**'
      - '.github/workflows/docs.yml'
  pull_request:
    paths:
      - 'docs/**'
      - 'src/**'
      - '.github/workflows/docs.yml'

# One docs build per ref; a newer push cancels an in-flight build so rapid
# successive commits collapse into a single deploy instead of a queue of them.
concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docs:
    name: Documentation
    runs-on: ubuntu-latest
    permissions:
      contents: write
      statuses: write
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: '1'
      - name: Configure doc environment
        shell: julia --project=docs {0}
        run: |
          using Pkg
          Pkg.develop(PackageSpec(path=pwd()))
          Pkg.instantiate()
      - uses: julia-actions/julia-buildpkg@v1
      - uses: julia-actions/julia-docdeploy@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Run doctests
        shell: julia --project=docs {0}
        run: |
          using Documenter: DocMeta, doctest
          using RepliBuild
          DocMeta.setdocmeta!(RepliBuild, :DocTestSetup, :(using RepliBuild); recursive=true)
          doctest(RepliBuild)
